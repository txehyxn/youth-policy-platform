<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>청년 정책 목록</title>
</head>
<body>

<h1>청년 정책 목록</h1>

<hr>

<table border="1">

    <tr>
        <th>ID</th>
        <th>정책명</th>
        <th>카테고리</th>
        <th>지원 내용</th>
        <th>상세보기</th>
    </tr>

    <tr th:each="benefit : ${benefits}">

        <td th:text="${benefit.id}"></td>

        <td th:text="${benefit.title}"></td>

        <td th:text="${benefit.category.name}"></td>

        <td th:text="${benefit.supportAmount}"></td>

        <td>
            <a th:href="@{/benefits/{id}(id=${benefit.id})}">
                상세보기
            </a>
        </td>

    </tr>

</table>

<hr>

<p>
    <a th:href="@{/}">
        홈으로 돌아가기
    </a>
</p>

</body>
</html>
