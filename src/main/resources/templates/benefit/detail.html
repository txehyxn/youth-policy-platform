<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정책 상세</title>
</head>
<body>

<h1 th:text="${benefit.title}"></h1>

<hr>

<p>
    <strong>카테고리:</strong>
    <span th:text="${benefit.category.name}"></span>
</p>

<p>
    <strong>정책 설명:</strong>
    <span th:text="${benefit.description}"></span>
</p>

<p>
    <strong>지원 내용:</strong>
    <span th:text="${benefit.supportAmount}"></span>
</p>

<p>
    <strong>신청 링크:</strong>
    <a th:href="${benefit.applicationUrl}"
       th:text="${benefit.applicationUrl}"
       target="_blank">
    </a>
</p>

<hr>

<h3>신청 일정</h3>

<p th:if="${schedules == null || schedules.isEmpty()}">
    등록된 신청 일정이 없습니다.
</p>

<table border="1"
       th:if="${schedules != null && !schedules.isEmpty()}">
    <tr>
        <th>일정 제목</th>
        <th>신청 시작일</th>
        <th>신청 종료일</th>
        <th>설명</th>
        <th>상태</th>
    </tr>

    <tr th:each="schedule : ${schedules}">
        <td th:text="${schedule.title}"></td>

        <!-- 상시 신청이면 날짜 칸에 '상시'라고 표시한다 -->
        <td th:if="${schedule.startDate == null}" colspan="2">
            <strong style="color:#2e86de;">상시 모집</strong>
        </td>
        <td th:unless="${schedule.startDate == null}" th:text="${schedule.startDate}"></td>
        <td th:unless="${schedule.startDate == null}" th:text="${schedule.endDate}"></td>

        <td th:text="${schedule.description}"></td>
        <td th:text="${schedule.statusLabel}"></td>
    </tr>
</table>

<hr>

<h3>신청 조건</h3>

<table border="1">

    <tr>
        <th>조건 항목</th>
        <th>연산</th>
        <th>기준</th>
    </tr>

    <tr th:each="condition : ${displayConditions}">
        <td th:text="${condition.fieldLabel}"></td>
        <td th:text="${condition.operatorLabel}"></td>
        <td th:text="${condition.valueLabel}"></td>
    </tr>

</table>

<hr>

<h3>관심 정책</h3>

<div th:if="${isBookmarked}">
    <form th:action="@{/bookmarks/{benefitId}/delete(benefitId=${benefit.id})}"
          method="post">

        <button type="submit">
            ♥ 관심 취소
        </button>

    </form>
</div>

<div th:unless="${isBookmarked}">
    <form th:action="@{/bookmarks/{benefitId}(benefitId=${benefit.id})}"
          method="post">

        <button type="submit">
            ♡ 관심 등록
        </button>

    </form>
</div>

<hr>

<h3>내 조건으로 신청 가능 여부 확인</h3>

<form action="/eligibility/check" method="get">

    <input type="hidden"
           name="benefitId"
           th:value="${benefit.id}">

    <button type="submit">
        내 프로필로 신청 가능 여부 확인
    </button>

</form>

<hr>

<a href="/benefits">
    목록으로 돌아가기
</a>

</body>
</html>
