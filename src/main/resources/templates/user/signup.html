<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<h1>회원가입</h1>

<hr>

<form action="/signup" method="post">

    <p>
        이메일
        <input type="email"
               name="email"
               placeholder="example@email.com"
               required>
    </p>

    <p>
        비밀번호
        <input type="password"
               name="password"
               placeholder="비밀번호 입력"
               required>
    </p>

    <p>
        비밀번호 확인
        <input type="password"
               name="passwordConfirm"
               placeholder="비밀번호 다시 입력"
               required>
    </p>

    <button type="submit">
        회원가입
    </button>

</form>

<hr>

<p>
    이미 계정이 있으신가요?
    <a href="/login">로그인</a>
</p>

<p>
    <a href="/">메인으로</a>
</p>

</body>
</html>
