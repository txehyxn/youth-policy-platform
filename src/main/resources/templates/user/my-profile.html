<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 프로필</title>
</head>
<body>

<h1>내 프로필</h1>

<p>
    Eligibility Engine에서 사용할 정보를 입력해주세요.
</p>

<hr>

<h3 th:if="${hasProfile}">
    프로필 수정
</h3>

<h3 th:unless="${hasProfile}">
    프로필 등록
</h3>

<form th:action="@{/my/profile}" method="post">

    <table>

        <tr>
            <td>나이</td>
            <td>
                <input type="number"
                       name="age"
                       min="0"
                       th:value="${profile != null ? profile.age : ''}"
                       required>
            </td>
        </tr>

        <tr>
            <td>지역</td>
            <td>
                <input type="text"
                       name="region"
                       placeholder="예: 경기도"
                       th:value="${profile != null ? profile.region : ''}"
                       required>
            </td>
        </tr>

        <tr>
            <td>가구원 수</td>
            <td>
                <input type="number"
                       name="householdSize"
                       min="1"
                       th:value="${profile != null ? profile.householdSize : ''}"
                       required>
            </td>
        </tr>

        <tr>
            <td>월 소득 (만원)</td>
            <td>
                <input type="number"
                       name="monthlyIncome"
                       min="0"
                       th:value="${profile != null ? profile.monthlyIncome : ''}"
                       required>
            </td>
        </tr>

        <tr>
            <td>연 소득 (만원)</td>
            <td>
                <input type="number"
                       name="annualIncome"
                       min="0"
                       th:value="${profile != null ? profile.annualIncome : ''}"
                       required>
            </td>
        </tr>

        <tr>
            <td>중위소득 (%)</td>
            <td>
                <input type="number"
                       name="middleIncomePercent"
                       min="0"
                       th:value="${profile != null ? profile.middleIncomePercent : ''}"
                       required>
            </td>
        </tr>

        <tr>
            <td>취업 여부</td>
            <td>

                <label>
                    <input type="radio"
                           name="employed"
                           value="true"
                           th:checked="${profile != null && profile.employed}">
                    예
                </label>

                <label>
                    <input type="radio"
                           name="employed"
                           value="false"
                           th:checked="${profile == null || !profile.employed}">
                    아니오
                </label>

            </td>
        </tr>

        <tr>
            <td>학생 여부</td>
            <td>

                <label>
                    <input type="radio"
                           name="student"
                           value="true"
                           th:checked="${profile != null && profile.student}">
                    예
                </label>

                <label>
                    <input type="radio"
                           name="student"
                           value="false"
                           th:checked="${profile == null || !profile.student}">
                    아니오
                </label>

            </td>
        </tr>

        <tr>
            <td>자가 보유 여부</td>
            <td>

                <label>
                    <input type="radio"
                           name="houseOwner"
                           value="true"
                           th:checked="${profile != null && profile.houseOwner}">
                    예
                </label>

                <label>
                    <input type="radio"
                           name="houseOwner"
                           value="false"
                           th:checked="${profile == null || !profile.houseOwner}">
                    아니오
                </label>

            </td>
        </tr>

    </table>

    <br>

    <button type="submit"
            th:text="${hasProfile ? '프로필 수정' : '프로필 등록'}">
    </button>

</form>

<hr>

<p>
    <a th:href="@{/}">메인으로</a>
</p>

</body>
</html>
