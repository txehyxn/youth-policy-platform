<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정책 조건 관리</title>
</head>
<body>

<h1>정책 조건 관리</h1>

<hr>

<h3>조건 등록</h3>

<form action="/admin/conditions" method="post">

    <p>
        정책

        <select name="benefitId">
            <option
                    th:each="benefit : ${benefits}"
                    th:value="${benefit.id}"
                    th:text="${benefit.id} + ' - ' + ${benefit.title}">
            </option>
        </select>
    </p>

    <p>
        필드명
        <input type="text" name="fieldName" placeholder="age">
    </p>

    <p>
        연산자
        <input type="text" name="operator" placeholder=">=">
    </p>

    <p>
        기준값
        <input type="text" name="value" placeholder="19">
    </p>

    <p>
        필수 여부

        <select name="required">
            <option value="true">true</option>
            <option value="false">false</option>
        </select>
    </p>

    <button type="submit">
        등록
    </button>

</form>

<hr>

<h3>등록된 조건</h3>

<table border="1">

    <tr>
        <th>ID</th>
        <th>정책</th>
        <th>필드명</th>
        <th>연산자</th>
        <th>값</th>
        <th>필수</th>
        <th>삭제</th>
    </tr>

    <tr th:each="condition : ${conditions}">
        <td th:text="${condition.id}"></td>

        <td th:text="${condition.benefit.id} + ' - ' + ${condition.benefit.title}"></td>

        <td th:text="${condition.fieldName}"></td>
        <td th:text="${condition.operator}"></td>
        <td th:text="${condition.value}"></td>
        <td th:text="${condition.required}"></td>

        <td>
            <form th:action="@{/admin/conditions/delete/{id}(id=${condition.id})}"
                  method="post">

                <button type="submit">
                    삭제
                </button>

            </form>
        </td>
    </tr>

</table>

<a href="/">목록으로 돌아가기</a>
</body>
</html>
