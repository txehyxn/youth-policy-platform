<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정책 상세</title>
</head>
<body>

<h1>정책 상세</h1>

<hr>

<h2 th:text="${benefit.title}"></h2>

<p>
    <strong>카테고리:</strong>
    <span th:text="${benefit.category.name}"></span>
</p>

<p>
    <strong>정책 설명:</strong>
    <span th:text="${benefit.description}"></span>
</p>

<p>
    <strong>지원 내용:</strong>
    <span th:text="${benefit.supportAmount}"></span>
</p>

<p>
    <strong>신청 링크:</strong>
    <a th:href="${benefit.applicationUrl}"
       th:text="${benefit.applicationUrl}"
       target="_blank">
    </a>
</p>

<p>
    <a th:href="@{/admin/benefits/{id}/edit(id=${benefit.id})}">
        정책 수정
    </a>
</p>

<hr>

<h3>조건 추가</h3>

<form th:action="@{/admin/benefits/{id}/conditions(id=${benefit.id})}"
      method="post">

    <p>
        조건 항목
        <select name="fieldName" required>
            <option value="age">나이</option>
            <option value="region">지역</option>
            <option value="householdSize">가구원 수</option>
            <option value="monthlyIncome">월 소득</option>
            <option value="annualIncome">연 소득</option>
            <option value="middleIncomePercent">중위소득</option>
            <option value="employed">취업 여부</option>
            <option value="student">학생 여부</option>
            <option value="houseOwner">자가 보유 여부</option>
        </select>
    </p>

    <p>
        연산자
        <select name="operator" required>
            <option value=">=">이상</option>
            <option value="<=">이하</option>
            <option value="==">같음</option>
            <option value="!=">다름</option>
        </select>
    </p>

    <p>
        기준값
        <input type="text"
               name="value"
               placeholder="예: 19, 경기도, true, false"
               required>
    </p>

    <p>
        필수 여부
        <select name="required">
            <option value="true">필수</option>
            <option value="false">선택</option>
        </select>
    </p>

    <button type="submit">
        조건 등록
    </button>

</form>

<hr>

<h3>정책 조건</h3>

<table border="1">
    <tr>
        <th>필드명</th>
        <th>연산자</th>
        <th>기준값</th>
        <th>필수 여부</th>
        <th>삭제</th>
    </tr>

    <tr th:each="condition : ${benefit.conditions}">
        <td th:text="${condition.fieldName}"></td>
        <td th:text="${condition.operator}"></td>
        <td th:text="${condition.value}"></td>
        <td th:text="${condition.required}"></td>
        <td>
            <form th:action="@{/admin/benefits/{benefitId}/conditions/delete/{conditionId}(benefitId=${benefit.id}, conditionId=${condition.id})}"
                  method="post">
                <button type="submit">삭제</button>
            </form>
        </td>
    </tr>
</table>

<hr>

<a href="/admin/benefits">목록으로 돌아가기</a>

</body>
</html>
